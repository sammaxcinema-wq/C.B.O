<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C.B.O · Ultra Pro SaaS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }
        body {
            background: #f0f4f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }

        .saas-container {
            max-width: 1440px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 24px 28px 28px;
            transition: all 0.2s ease;
            position: relative;
        }

        /* ===== AUTH OVERLAY ===== */
        .auth-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: all 0.3s ease;
        }
        .auth-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .auth-modal {
            background: white;
            padding: 40px 44px;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 420px;
            width: 100%;
            transform: scale(1);
            transition: all 0.3s ease;
        }
        .auth-overlay.hidden .auth-modal {
            transform: scale(0.95);
        }
        .auth-modal h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0a1f34;
            margin-bottom: 4px;
        }
        .auth-modal p.sub {
            color: #5f738c;
            font-size: 0.85rem;
            margin-bottom: 22px;
        }
        .auth-modal .form-group {
            margin-bottom: 14px;
        }
        .auth-modal .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #2c405a;
            margin-bottom: 4px;
        }
        .auth-modal .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #d0dcee;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.15s;
            background: #fafcff;
        }
        .auth-modal .form-group input:focus {
            outline: none;
            border-color: #0b2b4a;
            box-shadow: 0 0 0 3px rgba(11, 43, 74, 0.1);
            background: white;
        }
        .auth-modal .form-group .input-error {
            color: #b13e3e;
            font-size: 0.7rem;
            margin-top: 3px;
            display: none;
        }
        .auth-modal .form-group .input-error.show {
            display: block;
        }
        .auth-modal .auth-submit {
            width: 100%;
            padding: 12px;
            background: #0b2b4a;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 4px;
        }
        .auth-modal .auth-submit:hover {
            background: #1c3f62;
            transform: translateY(-1px);
        }
        .auth-modal .auth-toggle {
            margin-top: 16px;
            text-align: center;
            font-size: 0.85rem;
            color: #5f738c;
        }
        .auth-modal .auth-toggle a {
            color: #0b2b4a;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .auth-modal .auth-toggle a:hover {
            text-decoration: underline;
        }
        .auth-modal .role-selector {
            display: flex;
            gap: 8px;
            margin: 6px 0 2px;
            flex-wrap: wrap;
        }
        .auth-modal .role-selector label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #2c405a;
            cursor: pointer;
            padding: 5px 12px;
            border: 1.5px solid #d0dcee;
            border-radius: 30px;
            transition: all 0.15s;
        }
        .auth-modal .role-selector label:hover {
            border-color: #0b2b4a;
            background: #f5f9ff;
        }
        .auth-modal .role-selector input[type="radio"] {
            accent-color: #0b2b4a;
            margin: 0;
        }
        .auth-modal .role-selector label.selected {
            border-color: #0b2b4a;
            background: #eaf1fd;
        }

        /* ===== HEADER WITH IMAGE ===== */
        .app-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .app-header img {
            height: 48px;
            width: auto;
            border-radius: 12px;
            object-fit: contain;
        }
        .app-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0a1f34;
            letter-spacing: -0.3px;
        }
        .app-header .header-badge {
            background: #0b2b4a;
            color: white;
            font-size: 0.6rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: auto;
        }
